<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Vietnghemese</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --surface: #0d0d0d;
    --accent: #e94560;
    --accent2: #5b8dee;
    --text: #eaeaea;
    --text-dim: #888;
    --text-ipa: #a0c4ff;
    --radius: 18px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; height: 100dvh; }
  .screen.active { display: flex; }

  /* ── SHARED HEADER ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
    flex: 1;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    line-height: 1;
  }
  .icon-btn:active { color: var(--text); }

  /* ── MODE TOGGLE ── */
  .mode-bar {
    display: flex;
    padding: 12px 16px 4px;
    gap: 8px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .mode-pill {
    flex: 1;
    padding: 9px 0;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s, color 0.2s;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }
  .mode-pill.active {
    background: var(--accent);
    color: #fff;
  }
  .mode-pill.active.sent-mode {
    background: var(--accent2);
  }

  /* ── LESSON PICKER ── */
  .lesson-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 16px 24px;
  }
  .lesson-all {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(233,69,96,0.10);
    border: 1px solid rgba(233,69,96,0.28);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .lesson-all.sent-all {
    background: rgba(91,141,238,0.10);
    border-color: rgba(91,141,238,0.28);
  }
  .lesson-all:active { background: rgba(233,69,96,0.20); }
  .lesson-all.sent-all:active { background: rgba(91,141,238,0.20); }
  .lesson-all-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }
  .lesson-all.sent-all .lesson-all-text { color: var(--accent2); }
  .lesson-all-count { font-size: 13px; color: var(--text-dim); }

  .lesson-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .lesson-item:active { background: rgba(255,255,255,0.08); }
  .lesson-item.current-words  { border-color: rgba(233,69,96,0.4);  background: rgba(233,69,96,0.07); }
  .lesson-item.current-sents  { border-color: rgba(91,141,238,0.4); background: rgba(91,141,238,0.07); }
  .lesson-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .lesson-count { font-size: 12px; color: var(--text-dim); flex-shrink: 0; margin-left: 12px; }

  /* ── PROGRESS BAR ── */
  .progress-track { height: 3px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
  .progress-fill  { height: 100%; background: var(--accent); transition: width 0.3s ease; }
  .progress-fill.sent-fill { background: var(--accent2); }

  /* ── PLAYER CARD ── */
  .player-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 36px 28px;
    width: 100%;
    max-width: 440px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .card.playing       { border-color: rgba(233,69,96,0.35); box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(233,69,96,0.15); }
  .card.playing.sent  { border-color: rgba(91,141,238,0.35); box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(91,141,238,0.15); }

  /* Word card content */
  .pos-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(233,69,96,0.12);
    border-radius: 6px;
    padding: 3px 10px;
    margin-bottom: 20px;
  }
  .word {
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .english {
    font-size: clamp(17px, 4.5vw, 22px);
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 20px;
    line-height: 1.3;
  }
  .ipa {
    font-size: clamp(13px, 3.5vw, 15px);
    color: var(--text-ipa);
    font-family: 'Courier New', monospace;
    background: rgba(160,196,255,0.07);
    border-radius: 8px;
    padding: 6px 14px;
    display: inline-block;
    letter-spacing: 0.3px;
  }

  /* Sentence card content */
  .sent-keyword {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(91,141,238,0.12);
    border-radius: 6px;
    padding: 3px 10px;
    margin-bottom: 20px;
  }
  .sent-vi {
    font-size: clamp(20px, 6vw, 30px);
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 18px;
  }
  .sent-en {
    font-size: clamp(14px, 4vw, 18px);
    color: var(--text-dim);
    line-height: 1.5;
    font-style: italic;
  }

  /* Shared wave */
  .wave {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 28px;
    margin-top: 24px;
  }
  .wave-bar {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.3;
    height: 8px;
    transition: opacity 0.3s;
  }
  .wave.sent-wave .wave-bar { background: var(--accent2); }
  .wave.active .wave-bar {
    opacity: 1;
    animation: wave 1s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 26px; }
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 20px 28px;
    flex-shrink: 0;
  }
  .btn {
    border: none;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .btn:active { transform: scale(0.92); }
  .btn-skip {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.08);
    color: var(--text-dim);
    font-size: 22px;
  }
  .btn-play {
    width: 72px; height: 72px;
    background: var(--accent);
    color: white;
    font-size: 30px;
    box-shadow: 0 4px 20px rgba(233,69,96,0.4);
    transition: background 0.3s, box-shadow 0.3s, transform 0.1s;
  }
  .btn-play.sent-play {
    background: var(--accent2);
    box-shadow: 0 4px 20px rgba(91,141,238,0.4);
  }

  /* ── SETTINGS PANEL ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .settings-overlay.open { display: flex; }
  .settings-panel {
    background: #111;
    border-radius: 24px 24px 0 0;
    padding: 12px 20px 40px;
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.1);
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .settings-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 8px auto 20px;
  }
  .settings-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .setting-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label  { font-size: 15px; }
  .setting-sublabel { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .setting-value {
    display: flex; align-items: center;
    gap: 12px; color: var(--accent);
    font-weight: 600; font-size: 16px;
  }
  .setting-btn {
    background: rgba(255,255,255,0.08);
    border: none; color: var(--text);
    width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .setting-btn:hover { background: rgba(255,255,255,0.15); }
  .toggle {
    width: 48px; height: 28px;
    background: rgba(255,255,255,0.1);
    border-radius: 14px; position: relative;
    cursor: pointer; transition: background 0.2s;
    border: none; flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: ''; position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    background: white; border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform: translateX(20px); }
</style>
</head>
<body>

<!-- ═══════════════════════════════
     SCREEN 1: LESSON PICKER
═══════════════════════════════ -->
<div class="screen active" id="screenLessons">
  <div class="header">
    <span class="header-title">Vietnghemese</span>
    <button class="icon-btn" onclick="openSettings()" aria-label="Settings">⚙️</button>
  </div>

  <!-- Mode toggle -->
  <div class="mode-bar">
    <button class="mode-pill active" id="modeWords"      onclick="setPickerMode('words')">Words</button>
    <button class="mode-pill"        id="modeSentences"  onclick="setPickerMode('sentences')">Sentences</button>
  </div>

  <div class="lesson-list">
    <div class="lesson-all" id="allRow" onclick="selectLesson(null)">
      <span class="lesson-all-text" id="allLabel">All Words</span>
      <span class="lesson-all-count" id="allCount">950 words</span>
    </div>
    <div id="lessonItems"></div>
  </div>
</div>

<!-- ═══════════════════════════════
     SCREEN 2: PLAYER
═══════════════════════════════ -->
<div class="screen" id="screenPlayer">
  <div class="header">
    <button class="icon-btn" onclick="goToLessons()" aria-label="Back">←</button>
    <span class="header-title" id="lessonLabel">All Words</span>
    <span class="header-sub"   id="playerCounter">1 / 950</span>
    <button class="icon-btn" onclick="openSettings()" aria-label="Settings">⚙️</button>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div class="player-main">
    <div class="card" id="card">

      <!-- Word card content -->
      <div id="wordContent">
        <div class="pos-tag" id="posTag"></div>
        <div class="word"    id="wordEl">—</div>
        <div class="english" id="englishEl">—</div>
        <div class="ipa"     id="ipaEl"></div>
      </div>

      <!-- Sentence card content -->
      <div id="sentContent" style="display:none">
        <div class="sent-keyword" id="sentKeyword"></div>
        <div class="sent-vi"      id="sentVi">—</div>
        <div class="sent-en"      id="sentEn">—</div>
      </div>

      <div class="wave" id="wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-skip" onclick="prevWord()"   aria-label="Previous">⏮</button>
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()" aria-label="Play/Pause">▶</button>
    <button class="btn btn-skip" onclick="nextWord()"   aria-label="Next">⏭</button>
  </div>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOnBg(event)">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Repeat each item</div>
        <div class="setting-sublabel">Times to play before advancing</div>
      </div>
      <div class="setting-value">
        <button class="setting-btn" onclick="adjustRepeat(-1)">−</button>
        <span id="repeatDisplay">5×</span>
        <button class="setting-btn" onclick="adjustRepeat(1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Gap between items</div>
        <div class="setting-sublabel">Pause after each one</div>
      </div>
      <div class="setting-value">
        <button class="setting-btn" onclick="adjustGap(-0.5)">−</button>
        <span id="gapDisplay">1.5s</span>
        <button class="setting-btn" onclick="adjustGap(0.5)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Playback speed</div>
        <div class="setting-sublabel">Audio speed</div>
      </div>
      <div class="setting-value">
        <button class="setting-btn" onclick="adjustSpeed(-0.1)">−</button>
        <span id="speedDisplay">0.6×</span>
        <button class="setting-btn" onclick="adjustSpeed(0.1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Shuffle</div>
        <div class="setting-sublabel">Randomize order</div>
      </div>
      <button class="toggle" id="shuffleToggle" onclick="toggleShuffle()"></button>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Restart</div>
        <div class="setting-sublabel">Jump back to the first item</div>
      </div>
      <div class="setting-value">
        <button class="setting-btn" onclick="jumpToStart()" style="font-size:14px;">↩</button>
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

  window.speechSynthesis.cancel();

const LESSONS = ["01_Introduction","02_Basic_Sentences","03_Numbers_Family","04_Numbers_Counting","05_Activities","06_Food_Tastes","07_Vegetables_Fruits","08_In_the_Café","09_Eating_Out","10_Where_is_it?","11_Places_Locations","12_Navigation","13_Occupations_Workplaces","14_Family_Members_Moods","15_Shapes,_Objects,_Colors","16_Clothing","17_Accessories","18_Footwear","19_Date","20_Time","21_Traveling","22_In_the_Classroom","23_Music","24_Post_Office_Bank","25_Sightseeing","26_Accommodation","27_At_the_Airport","28_Relationships","29_Emergency","30_Meet_the_Doctor","31_Body_Appearance","32_Weather_Forecast","33_Reasoning","34_Dating","35_Romance_I","36_Social_Network","37_Romance_II","38_Cooking","39_Telling_A_Story","40_In_the_Meeting","41_Business","42_Business_Talk","43_Nature_Landscape","44_Disaster","45_Spaceship","46_In_the_House","47_In_the_Court","48_Health","49_Wishes_I","50_Wishes_II"];

const SCOUNTS = {"01_Introduction":15,"04_Numbers_Counting":21,"02_Basic_Sentences":18,"37_Romance_II":20,"22_In_the_Classroom":24,"03_Numbers_Family":15,"14_Family_Members_Moods":19,"15_Shapes,_Objects,_Colors":21,"32_Weather_Forecast":22,"13_Occupations_Workplaces":21,"05_Activities":18,"28_Relationships":21,"34_Dating":20,"35_Romance_I":21,"36_Social_Network":19,"42_Business_Talk":20,"06_Food_Tastes":23,"38_Cooking":22,"12_Navigation":22,"30_Meet_the_Doctor":22,"48_Health":19,"07_Vegetables_Fruits":18,"23_Music":20,"08_In_the_Café":22,"18_Footwear":19,"27_At_the_Airport":18,"09_Eating_Out":18,"25_Sightseeing":24,"40_In_the_Meeting":23,"10_Where_is_it?":22,"11_Places_Locations":19,"26_Accommodation":20,"20_Time":20,"21_Traveling":24,"50_Wishes_II":18,"39_Telling_A_Story":21,"16_Clothing":19,"33_Reasoning":18,"17_Accessories":22,"46_In_the_House":21,"31_Body_Appearance":22,"19_Date":23,"29_Emergency":19,"49_Wishes_I":18,"24_Post_Office_Bank":22,"41_Business":24,"47_In_the_Court":23,"44_Disaster":19,"43_Nature_Landscape":22,"45_Spaceship":20};

// ── State ─────────────────────────────
let pickerMode      = 'words';     // 'words' | 'sentences'
let playerMode      = 'words';     // locked when entering player
let playlist        = [];
let currentIndex    = 0;
let isPlaying       = false;
let gap             = 1.5;
let speed           = 0.6;
let shuffle         = false;
let repeatCount     = 5;
let currentRepeat   = 0;
let gapTimer        = null;
let watchdogTimer   = null;
let wakeLock        = null;
let activeLessonKey = null;

// ── DOM refs ──────────────────────────
const wordEl    = document.getElementById('wordEl');
const englishEl = document.getElementById('englishEl');
const ipaEl     = document.getElementById('ipaEl');
const posTag    = document.getElementById('posTag');
const sentVi    = document.getElementById('sentVi');
const sentEn    = document.getElementById('sentEn');
const sentKw    = document.getElementById('sentKeyword');
const counter   = document.getElementById('playerCounter');
const progress  = document.getElementById('progress');
const playBtn   = document.getElementById('playBtn');
const wave      = document.getElementById('wave');
const card      = document.getElementById('card');
const audio     = document.getElementById('audio');

// ── Picker mode toggle ─────────────────
function setPickerMode(mode) {
  pickerMode = mode;
  document.getElementById('modeWords').classList.toggle('active', mode === 'words');
  document.getElementById('modeSentences').classList.toggle('active', mode === 'sentences');
  document.getElementById('modeSentences').classList.toggle('sent-mode', mode === 'sentences');

  const isSent = mode === 'sentences';
  const allRow = document.getElementById('allRow');
  allRow.classList.toggle('sent-all', isSent);
  document.getElementById('allLabel').textContent  = isSent ? 'All Sentences' : 'All Words';
  document.getElementById('allCount').textContent  = isSent
    ? Object.values(SCOUNTS).reduce((a,b)=>a+b,0) + ' sentences'
    : '950 words';

  buildLessonList();
}

function prettyLesson(key) {
  const parts = key.split('_');
  const num = parts[0];
  const name = parts.slice(1).join(' ');
  return num + '. ' + name;
}

function buildLessonList() {
  const container = document.getElementById('lessonItems');
  container.innerHTML = '';
  const isSent = pickerMode === 'sentences';
  LESSONS.forEach(key => {
    const count = isSent ? (SCOUNTS[key] || 0) : (COUNTS[key] || 0);
    if (count === 0) return;
    const isCurrentWords = !isSent && key === activeLessonKey && playerMode === 'words';
    const isCurrentSents = isSent  && key === activeLessonKey && playerMode === 'sentences';
    const div = document.createElement('div');
    div.className = 'lesson-item'
      + (isCurrentWords ? ' current-words' : '')
      + (isCurrentSents ? ' current-sents' : '');
    div.innerHTML =
      '<span class="lesson-name">' + prettyLesson(key) + '</span>' +
      '<span class="lesson-count">' + count + (isSent ? ' sentences' : ' words') + '</span>';
    div.onclick = () => selectLesson(key);
    container.appendChild(div);
  });
}

function selectLesson(key) {
  activeLessonKey = key;
  playerMode = pickerMode;
  resetPlayer();
  showScreen('screenPlayer');

  const label = document.getElementById('lessonLabel');
  label.textContent = key ? prettyLesson(key) : (playerMode === 'sentences' ? 'All Sentences' : 'All Words');

  // Tint player for sentence mode
  const isSent = playerMode === 'sentences';
  progress.className = 'progress-fill' + (isSent ? ' sent-fill' : '');
  playBtn.classList.toggle('sent-play', isSent);
  wave.classList.toggle('sent-wave', isSent);
}

function goToLessons() {
  pause();
  buildLessonList();
  showScreen('screenLessons');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Playlist ──────────────────────────
function buildPlaylist() {
  let pool;
  if (playerMode === 'sentences') {
    pool = WORDS
      .map((w, i) => (w.sentaudio ? i : -1))
      .filter(i => i >= 0);
  } else {
    pool = WORDS.map((_, i) => i);
  }

  if (activeLessonKey !== null) {
    pool = pool.filter(i => WORDS[i].lessons && WORDS[i].lessons.includes(activeLessonKey));
  }

  playlist = pool;
  if (shuffle) shuffleArray(playlist);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function resetPlayer() {
  pause();
  currentIndex = 0;
  currentRepeat = 0;
  buildPlaylist();
  showCard();
}

// ── Display ───────────────────────────
function currentWord() { return WORDS[playlist[currentIndex]]; }

function showCard() {
  const w = currentWord();
  if (!w) return;

  const isSent = playerMode === 'sentences';
  document.getElementById('wordContent').style.display = isSent ? 'none' : '';
  document.getElementById('sentContent').style.display = isSent ? ''     : 'none';

  if (isSent) {
    sentKw.textContent = w.word;
    sentVi.textContent = w.sent  || '—';
    sentEn.textContent = w.senten || '—';
  } else {
    wordEl.textContent    = w.word;
    englishEl.textContent = w.english;
    ipaEl.textContent     = w.ipa || '';
    ipaEl.style.display   = w.ipa ? 'inline-block' : 'none';
    posTag.textContent    = w.pos || '';
    posTag.style.display  = w.pos ? 'inline-block' : 'none';
  }

  counter.textContent  = (currentIndex + 1) + ' / ' + playlist.length;
  progress.style.width = ((currentIndex + 1) / playlist.length * 100) + '%';
}

// ── Playback ──────────────────────────
function getAudioFile(w) {
  return playerMode === 'sentences' ? w.sentaudio : w.audio;
}

function clearWatchdog() {
  clearTimeout(watchdogTimer);
  watchdogTimer = null;
}

function armWatchdog() {
  clearWatchdog();
  // If audio hasn't ended within 15s, force-advance
  watchdogTimer = setTimeout(() => {
    wave.classList.remove('active');
    card.classList.remove('playing');
    card.classList.remove('sent');
    currentRepeat = 0;
    if (isPlaying) advanceWord();
  }, 15000);
}

function playCurrentWord() {
  const w = currentWord();
  if (!w) return;
  showCard();
  const file = getAudioFile(w);
  if (!file) { advanceWord(); return; }
  audio.src          = 'audio/' + file;
  audio.playbackRate = speed;
  audio.play().catch(() => {
    clearWatchdog();
    if (isPlaying) advanceWord();
  });
  card.classList.add('playing');
  if (playerMode === 'sentences') card.classList.add('sent');
  wave.classList.add('active');
  armWatchdog();
}

function replayWord() {
  // Full src reload — more reliable than seeking to 0 on mobile
  const w = currentWord();
  const file = getAudioFile(w);
  audio.src = 'audio/' + file;
  audio.playbackRate = speed;
  audio.play().catch(() => {
    clearWatchdog();
    if (isPlaying) advanceWord();
  });
  wave.classList.add('active');
  card.classList.add('playing');
  if (playerMode === 'sentences') card.classList.add('sent');
  armWatchdog();
}

audio.addEventListener('ended', () => {
  clearWatchdog();
  currentRepeat++;
  if (isPlaying && currentRepeat < repeatCount) {
    wave.classList.remove('active');
    card.classList.remove('playing');
    card.classList.remove('sent');
    gapTimer = setTimeout(replayWord, gap * 0.5 * 1000);
  } else {
    wave.classList.remove('active');
    card.classList.remove('playing');
    card.classList.remove('sent');
    if (isPlaying) {
      gapTimer = setTimeout(() => {
        currentRepeat = 0;
        advanceWord();
      }, gap * 1000);
    }
  }
});

audio.addEventListener('error', () => {
  clearWatchdog();
  wave.classList.remove('active');
  card.classList.remove('playing');
  card.classList.remove('sent');
  if (isPlaying) advanceWord();
});

function advanceWord() {
  currentIndex++;
  if (currentIndex >= playlist.length) {
    currentIndex = 0;
    if (shuffle) shuffleArray(playlist);
  }
  if (isPlaying) playCurrentWord(); else showCard();
}

function togglePlay() { isPlaying ? pause() : play(); }

function play() {
  isPlaying = true;
  playBtn.textContent = '⏸';
  playCurrentWord();
  requestWakeLock();
}

function pause() {
  isPlaying = false;
  playBtn.textContent = '▶';
  audio.pause();
  clearWatchdog();
  wave.classList.remove('active');
  card.classList.remove('playing');
  card.classList.remove('sent');
  clearTimeout(gapTimer);
  currentRepeat = 0;
  releaseWakeLock();
}

function nextWord() {
  clearTimeout(gapTimer); clearWatchdog(); audio.pause();
  wave.classList.remove('active');
  card.classList.remove('playing'); card.classList.remove('sent');
  currentRepeat = 0;
  currentIndex = (currentIndex + 1) % playlist.length;
  if (isPlaying) playCurrentWord(); else showCard();
}

function prevWord() {
  clearTimeout(gapTimer); clearWatchdog(); audio.pause();
  wave.classList.remove('active');
  card.classList.remove('playing'); card.classList.remove('sent');
  currentRepeat = 0;
  currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
  if (isPlaying) playCurrentWord(); else showCard();
}

// ── Settings ──────────────────────────
function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettingsOnBg(e) {
  if (e.target === document.getElementById('settingsOverlay'))
    document.getElementById('settingsOverlay').classList.remove('open');
}
function adjustRepeat(d) {
  repeatCount = Math.max(1, Math.min(10, repeatCount + d));
  document.getElementById('repeatDisplay').textContent = repeatCount + '×';
}
function adjustGap(d) {
  gap = Math.max(0.5, Math.min(10, Math.round((gap + d) * 10) / 10));
  document.getElementById('gapDisplay').textContent = gap.toFixed(1) + 's';
}
function adjustSpeed(d) {
  speed = Math.max(0.5, Math.min(2.0, Math.round((speed + d) * 10) / 10));
  document.getElementById('speedDisplay').textContent = speed.toFixed(1) + '×';
  audio.playbackRate = speed;
}
function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffleToggle').classList.toggle('on', shuffle);
  const cur = playlist[currentIndex];
  if (shuffle) {
    playlist = playlist.filter(i => i !== cur);
    shuffleArray(playlist);
    playlist.unshift(cur);
  } else { buildPlaylist(); }
  currentIndex = 0;
  showCard();
}
function jumpToStart() {
  clearTimeout(gapTimer); clearWatchdog(); audio.pause();
  wave.classList.remove('active');
  card.classList.remove('playing'); card.classList.remove('sent');
  currentRepeat = 0; currentIndex = 0;
  if (shuffle) buildPlaylist();
  if (isPlaying) playCurrentWord(); else showCard();
}

// ── Wake Lock ─────────────────────────
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && isPlaying) requestWakeLock();
});

// ── Touch navigation ──────────────────
(function() {
  const SWIPE_MIN   = 40;  // px minimum to count as a swipe
  const SWIPE_MAX_Y = 80;  // px max vertical drift for horizontal swipe (and vice versa)
  let startX = 0, startY = 0, moved = false;

  const player = document.getElementById('screenPlayer');

  player.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved  = false;
  }, { passive: true });

  player.addEventListener('touchmove', e => {
    moved = true;
  }, { passive: true });

  player.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);

    if (absDx > SWIPE_MIN && absDy < SWIPE_MAX_Y) {
      // Horizontal swipe — skip word
      if (dx < 0) nextWord(); else prevWord();
    } else if (absDy > SWIPE_MIN && absDx < SWIPE_MAX_Y) {
      // Vertical swipe — play/pause
      togglePlay();
    }
  }, { passive: true });
})();

// ── Init ──────────────────────────────
buildLessonList();
buildPlaylist();
showCard();
</script>
